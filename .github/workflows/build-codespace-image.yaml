name: Build codespace-dev image

on:
  push:
    paths:
      - '.github/workflows/build-codespace-image.yaml'
      - 'codespace/image/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: codespace/image
          file: codespace/image/Dockerfile
          push: true
          tags: ghcr.io/curoky/devspace:codespace-image-debian12
