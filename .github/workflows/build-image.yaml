  dist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: gcc
            saved_image: gcc
          - name: gui
            saved_image: gui
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.name }}
          file: images/${{ matrix.name }}/Dockerfile
          push: true
          # provenance: mode=max
          provenance: false
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          # cache-from: type=registry,ref=curoky/devspace:__cache_dist_${{ matrix.saved_image }}
          # cache-to: type=registry,ref=curoky/devspace:__cache_dist_${{ matrix.saved_image }},mode=max
          cache-from: type=registry,ref=ghcr.io/curoky/devspace-cache:${{ matrix.saved_image }}
          cache-to: type=registry,ref=ghcr.io/curoky/devspace-cache:${{ matrix.saved_image }},mode=max
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.disable_docker_cache == true }}
          tags: ghcr.io/curoky/devspace:${{ matrix.saved_image }}
          outputs: type=image,oci-mediatypes=true

