name: Build images

on:
  push:
    paths:
      - '.github/workflows/build-image.yaml'
      - 'images/**'
  workflow_dispatch:
    inputs:
      disable_docker_cache:
        description: 'disable docker cache'
        default: false
        required: false
        type: boolean
  schedule:
    - cron: '0 0 * * 0'

