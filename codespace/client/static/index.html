<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codespace Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-line">
          <h1>Codespace</h1>
          <span id="config-summary" class="meta-pill">加载配置中...</span>
        </div>
        <div class="toolbar">
          <select id="quick-template-select" class="select-control toolbar-template">
            <option value="">template...</option>
          </select>
          <button id="quick-template-button" class="button is-small" type="button">
            Apply
          </button>
          <button class="button is-small" type="button" data-action="open-create">
            Blank
          </button>
          <button id="refresh-button" class="button is-small" type="button">
            Refresh
          </button>
          <button id="create-button" class="button is-primary is-small" type="button">
            Create
          </button>
        </div>
      </header>

      <main class="workbench">
        <section class="main-pane">
          <section class="stats-row" aria-label="Dashboard summary">
            <div><span>codespaces</span><strong id="stat-codespaces">0</strong></div>
            <div><span>online</span><strong id="stat-online-agents">0</strong></div>
            <div><span>offline</span><strong id="stat-offline-agents">0</strong></div>
            <div><span>ops</span><strong id="stat-running-ops">0</strong></div>
          </section>

          <section id="global-error" class="notification is-warning is-light d-none" role="alert"></section>

          <section id="codespaces" class="panel codespace-panel">
            <div class="panel-header">
              <h2>Codespaces</h2>
              <span id="codespace-count" class="count-badge">0</span>
            </div>

            <div class="filter-bar" aria-label="Codespace filters">
              <select id="agent-filter" class="select-control"></select>
              <select id="status-filter" class="select-control">
                <option value="all">All status</option>
                <option value="running">Running</option>
                <option value="stopped">Stopped</option>
                <option value="unknown">Unknown</option>
              </select>
              <input
                id="search-input"
                class="input is-small"
                type="search"
                placeholder="repo / workspace / alias / id"
              />
              <select id="sort-select" class="select-control">
                <option value="agent">Agent</option>
                <option value="repo">Repository</option>
                <option value="workspace">Workspace</option>
                <option value="status">Status</option>
              </select>
              <button id="clear-search-button" class="button is-small" type="button">
                Clear
              </button>
            </div>

            <div id="codespace-empty" class="empty-state d-none">暂无 codespace</div>
            <div id="codespace-card-grid" class="codespace-grid"></div>

            <div class="table-container table-scroll">
              <table class="table is-fullwidth is-hoverable is-narrow codespace-table">
                <thead>
                  <tr>
                    <th>Agent</th>
                    <th>Repo</th>
                    <th>Workspace</th>
                    <th>Alias</th>
                    <th>Status</th>
                    <th>SSH</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody id="codespace-tbody"></tbody>
              </table>
            </div>
          </section>
        </section>

        <aside class="side-pane">
          <section class="panel" id="system-status">
            <div class="panel-header compact">
              <h2>Runtime</h2>
              <label class="auto-refresh-label">
                <input id="auto-refresh-toggle" type="checkbox" checked />
                auto
              </label>
            </div>
            <div id="token-status-card"></div>
            <p id="last-updated" class="muted-line">尚未刷新</p>
          </section>

          <section id="templates" class="panel">
            <div class="panel-header compact">
              <h2>Templates</h2>
            </div>
            <div id="template-list" class="template-grid"></div>
          </section>

          <section id="agents" class="panel">
            <div class="panel-header compact">
              <h2>Agents</h2>
            </div>
            <div id="agent-summary" class="agent-grid stacked"></div>
          </section>

          <section id="operations" class="panel">
            <div class="panel-header compact">
              <h2>Operations</h2>
              <button id="clear-operations-button" class="button is-small" type="button">
                Clear
              </button>
            </div>
            <div id="operation-list" class="operation-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast-area" class="toast-area" aria-live="polite" aria-atomic="true"></div>

    <dialog id="create-dialog" class="create-dialog">
      <form id="create-form" method="dialog" class="modal-card">
        <div class="dialog-header">
          <h2>Create Codespace</h2>
          <button id="create-cancel" type="button" class="button is-small is-light close-button">×</button>
        </div>
        <div class="dialog-body">
          <div id="create-error" class="notification is-danger is-light d-none" role="alert"></div>
          <div id="create-token-warning" class="notification is-warning is-light d-none" role="alert"></div>
          <div class="create-form-grid">
            <label class="field-half form-label">
              Agent
              <select id="create-agent" name="agent" class="select-control mt-1"></select>
            </label>
            <label class="field-half form-label">
              Repo
              <input
                id="create-repo"
                name="repo"
                class="input mt-1"
                required
                placeholder="owner/name"
              />
            </label>
            <label class="field-half form-label">
              Workspace
              <input id="create-workspace" name="workspace" class="input mt-1" required />
            </label>
            <label class="field-full form-label">
              Alias
              <input id="create-alias" name="alias" class="input mt-1" required />
            </label>
            <label class="field-full checkbox-row">
              <input id="create-auto-alias" type="checkbox" checked />
              <span class="form-check-label">auto alias</span>
            </label>
            <label class="field-full form-label">
              Image
              <input id="create-image" name="image" class="input mt-1" required />
            </label>
            <div id="create-agent-help" class="field-full agent-help"></div>
            <label class="field-full form-label">
              Extra repos
              <textarea
                id="create-extra-repos"
                name="extra_repos"
                class="textarea mt-1"
                rows="3"
                placeholder="owner/repo，每行一个或用逗号分隔"
              ></textarea>
            </label>
          </div>
        </div>
        <div class="dialog-footer">
          <button id="create-cancel-footer" type="button" class="button">Cancel</button>
          <button type="submit" class="button is-primary">Create</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
