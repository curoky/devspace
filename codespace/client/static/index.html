<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codespace Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-main">
        <header class="top-command-bar">
          <div>
            <h1 class="h5 mb-0">Codespace Dashboard</h1>
          </div>
          <div class="top-actions">
            <span id="config-summary" class="badge text-bg-light rounded-pill px-3 py-2">
              加载配置中...
            </span>
            <button id="refresh-button" class="btn btn-light btn-sm shadow-sm" type="button">
              Refresh
            </button>
            <button id="create-button" class="btn btn-primary btn-sm shadow-sm" type="button">
              Create
            </button>
          </div>
        </header>

        <main class="content-grid">
          <section class="workspace-column">
            <section id="overview" class="hero-card command-center mb-4">
              <div class="quick-create-panel">
                <label class="form-label small text-secondary mb-1" for="quick-template-select">
                  Template
                </label>
                <div class="input-group input-group-sm">
                  <select id="quick-template-select" class="form-select">
                    <option value="">选择模板...</option>
                  </select>
                  <button id="quick-template-button" class="btn btn-primary" type="button">
                    Apply
                  </button>
                </div>
                <button class="btn btn-outline-primary btn-sm w-100 mt-2" type="button" data-action="open-create">
                  Blank
                </button>
              </div>
            </section>

            <section class="row g-3 mb-4" aria-label="Dashboard summary">
              <div class="col-6 col-xl-3">
                <div class="metric-card">
                  <div>
                    <p class="metric-label">Codespaces</p>
                    <strong id="stat-codespaces">0</strong>
                  </div>
                </div>
              </div>
              <div class="col-6 col-xl-3">
                <div class="metric-card">
                  <div>
                    <p class="metric-label">Online Agents</p>
                    <strong id="stat-online-agents">0</strong>
                  </div>
                </div>
              </div>
              <div class="col-6 col-xl-3">
                <div class="metric-card">
                  <div>
                    <p class="metric-label">Offline Agents</p>
                    <strong id="stat-offline-agents">0</strong>
                  </div>
                </div>
              </div>
              <div class="col-6 col-xl-3">
                <div class="metric-card">
                  <div>
                    <p class="metric-label">Running Ops</p>
                    <strong id="stat-running-ops">0</strong>
                  </div>
                </div>
              </div>
            </section>

            <section id="global-error" class="alert alert-warning d-none" role="alert"></section>

            <section id="templates" class="surface-panel mb-4">
              <div class="section-heading">
                <div>
                  <h2 class="h6 mb-0">Create Templates</h2>
                </div>
              </div>
              <div id="template-list" class="template-grid"></div>
            </section>

            <section id="codespaces" class="surface-panel mb-4">
              <div class="section-heading align-items-start">
                <div>
                  <h2 class="h6 mb-0">Codespaces</h2>
                </div>
                <span class="badge text-bg-primary rounded-pill" id="codespace-count">0</span>
              </div>

              <div class="filter-bar" aria-label="Codespace filters">
                <label class="filter-field">
                  <span>Agent</span>
                  <select id="agent-filter" class="form-select form-select-sm"></select>
                </label>
                <label class="filter-field">
                  <span>Status</span>
                  <select id="status-filter" class="form-select form-select-sm">
                    <option value="all">All</option>
                    <option value="running">Running</option>
                    <option value="stopped">Stopped</option>
                    <option value="unknown">Unknown</option>
                  </select>
                </label>
                <label class="filter-field search-field">
                  <span>Search</span>
                  <div class="input-group input-group-sm">
                    <input
                      id="search-input"
                      class="form-control"
                      type="search"
                      placeholder="repo / workspace / alias / id"
                    />
                  </div>
                </label>
                <label class="filter-field">
                  <span>Sort</span>
                  <select id="sort-select" class="form-select form-select-sm">
                    <option value="agent">Agent</option>
                    <option value="repo">Repository</option>
                    <option value="workspace">Workspace</option>
                    <option value="status">Status</option>
                  </select>
                </label>
                <button id="clear-search-button" class="btn btn-outline-secondary btn-sm" type="button">
                  Clear
                </button>
              </div>

              <div id="codespace-empty" class="empty-state d-none">
                <p class="mb-0">暂无 codespace</p>
              </div>

              <div id="codespace-card-grid" class="codespace-grid mb-3"></div>

              <details class="table-disclosure" open>
                <summary>详细表格视图</summary>
                <div class="table-responsive mt-3">
                  <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr>
                        <th>Agent</th>
                        <th>Repository</th>
                        <th>Workspace</th>
                        <th>Alias</th>
                        <th>Status</th>
                        <th>SSH</th>
                        <th class="text-end">Actions</th>
                      </tr>
                    </thead>
                    <tbody id="codespace-tbody"></tbody>
                  </table>
                </div>
              </details>
            </section>
          </section>

          <aside class="insight-column">
            <section class="surface-panel mb-4" id="system-status">
              <div class="section-heading compact">
                <div>
                  <h2 class="h6 mb-0">Runtime</h2>
                </div>
                <label class="form-check form-switch small mb-0">
                  <input id="auto-refresh-toggle" class="form-check-input" type="checkbox" checked />
                  Auto refresh
                </label>
              </div>
              <div id="token-status-card" class="token-status-card"></div>
              <p id="last-updated" class="text-secondary small mb-0 mt-2">尚未刷新</p>
            </section>

            <section id="agents" class="surface-panel mb-4">
              <div class="section-heading compact">
                <div>
                  <h2 class="h6 mb-0">Agents</h2>
                </div>
              </div>
              <div id="agent-summary" class="agent-grid stacked"></div>
            </section>

            <section id="operations" class="surface-panel">
              <div class="section-heading compact">
                <div>
                  <h2 class="h6 mb-0">Operations</h2>
                </div>
                <button id="clear-operations-button" class="btn btn-outline-secondary btn-sm" type="button">
                  Clear
                </button>
              </div>
              <div id="operation-list" class="operation-list"></div>
            </section>
          </aside>
        </main>
      </div>
    </div>

    <div id="toast-area" class="toast-area" aria-live="polite" aria-atomic="true"></div>

    <dialog id="create-dialog" class="create-dialog">
      <form id="create-form" method="dialog" class="card border-0 shadow-lg modal-card">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
          <div>
            <h2 class="h4 mb-1">Create Codespace</h2>
          </div>
          <button id="create-cancel" type="button" class="btn btn-light btn-sm">
            ×
          </button>
        </div>
        <div class="card-body d-grid gap-3">
          <div id="create-error" class="alert alert-danger d-none" role="alert"></div>
          <div id="create-token-warning" class="alert alert-warning d-none" role="alert"></div>
          <div class="row g-3">
            <label class="col-md-6 form-label">
              Agent
              <select id="create-agent" name="agent" class="form-select mt-1"></select>
            </label>
            <label class="col-md-6 form-label">
              User
              <input id="create-user" name="user" class="form-control mt-1" required />
            </label>
            <label class="col-md-6 form-label">
              Repo
              <input
                id="create-repo"
                name="repo"
                class="form-control mt-1"
                required
                placeholder="owner/name"
              />
            </label>
            <label class="col-md-6 form-label">
              Workspace
              <input id="create-workspace" name="workspace" class="form-control mt-1" required />
            </label>
            <label class="col-12 form-label">
              Alias
              <input id="create-alias" name="alias" class="form-control mt-1" required />
            </label>
            <label class="col-12 form-check form-switch ms-2">
              <input id="create-auto-alias" class="form-check-input" type="checkbox" checked />
              <span class="form-check-label">自动根据 agent、repo、workspace 生成 alias</span>
            </label>
            <label class="col-12 form-label">
              Image
              <input id="create-image" name="image" class="form-control mt-1" required />
            </label>
            <div id="create-agent-help" class="agent-help small text-secondary"></div>
            <label class="col-12 form-label">
              Extra repos
              <textarea
                id="create-extra-repos"
                name="extra_repos"
                class="form-control mt-1"
                rows="3"
                placeholder="owner/repo，每行一个或用逗号分隔"
              ></textarea>
            </label>
          </div>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-end gap-2">
          <button id="create-cancel-footer" type="button" class="btn btn-outline-secondary">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            Create
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
