# lefthook install
# lefthook run pre-commit

pre-commit:
  fail_on_changes: 'always'
  jobs:
    - name: shell script
      run: shfmt -w -i 2 -s -l -ci {staged_files}
      glob: '*.{sh}'
      stage_fixed: false

    - name: python
      run: ruff format --no-cache --force-exclude {staged_files}
      glob: '*.{py}'
      stage_fixed: false

    - name: python-lint
      run: ruff check --no-cache --force-exclude {staged_files}
      glob: '*.{py}'
      stage_fixed: false

    - name: python-type
      # mypy needs the whole package for cross-module inference, so it ignores
      # {staged_files} and type-checks the project when any .py file is staged.
      run: uv run mypy codespace/
      glob: '*.{py}'
      stage_fixed: false

    - name: c/c++
      run: clang-format -i -style=file {staged_files}
      glob: '*.{c,cc,cpp,h,hpp}'
      stage_fixed: false

    - name: protobuf
      run: clang-format -i -style=file {staged_files}
      glob: '*.{proto}'
      stage_fixed: false

    # - name: json
    #   run: shfmt -w -i 2 -s -l -ci {staged_files}
    #   glob: '*.{json}'
    #   stage_fixed: false

    # - name: yaml
    #   run: shfmt -w -i 2 -s -l -ci {staged_files}
    #   glob: '*.{yaml}'
    #   stage_fixed: false

commit-msg:
  commands:
    check-git-author:
      run: tools/check-author.sh -n curoky -e cccuroky@gmail.com
